<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ni-NaadBramha Sangeet Vidyalaya</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for elegant typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-links">
            <a href="#home" class="nav-item">Home</a>
            <a href="#about" class="nav-item">About Us</a>
            <a href="#courses" class="nav-item">Courses</a>
            <a href="#contact" class="nav-item">Contact</a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-container">

        <!-- Left Side: Photo Frame -->
        <div class="side-column left-column">
            <div class="photo-frame">
                <span class="placeholder-text">Photo Frame</span>
            </div>
        </div>

        <!-- Center: Name of Firm -->
        <div class="center-column">
            <!-- Musical Element/Icon could go here -->
            <h1 class="firm-name">Ni-NaadBramha <br> <span class="subtitle">Academy of Music...</span></h1>
            <p class="tagline">Where Soul Meets Sound</p>
            <div class="musical-divider"></div>
        </div>

        <!-- Right Side: Logo Frame -->
        <div class="side-column right-column">
            <div class="logo-frame">
                <span class="placeholder-text">Logo Frame</span>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
